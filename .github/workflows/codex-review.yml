name: Codex AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Codex automatic review
        uses: openai/codex-github-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          review: true
          comment_on_pr: true
          suggest_fixes: true